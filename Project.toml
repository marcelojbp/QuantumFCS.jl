name = "QuantumFCS"
uuid = "f61df7d1-40df-4ff5-bdc9-ea200d60bc8f"
authors = ["aarondanielphysics <aaron.daniel>", "marcelojbp <marcelobro.pera@gmail.com>"]
version = "1.0.0"

[deps]
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
SparseArrays = "2f01184e-e22b-5df5-ae63-d93ebab69eaf"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

#optional dependencies
[weakdeps]
QuantumOptics = "6e0679c1-51ea-5a7c-ac74-d61b76210b0c"
QuantumToolbox = "6c2fb7c5-b903-41d2-bc5e-5a7c320b9fab"
Krylov = "ba0b0d4f-ebba-5204-a429-3ac8c609bfb7"
IncompleteLU = "40713840-3770-5561-ab4c-a76e7d0d7895"

[extensions]
QuantumFCSQuantumOpticsExt = ["QuantumOptics"]      # loads if QuantumOptics is present
QuantumFCSQuantumToolboxExt = ["QuantumToolbox"]    # loads if QuantumToolbox is present
QuantumFCSIterativeExt = ["Krylov", "IncompleteLU"] # iterative Drazin backend

[compat]
julia = "1.10, 1.11, 1.12"
QuantumToolbox = "0.28"
Krylov = "0.10"          # iterative ext uses the GmresWorkspace / gmres! API (0.10+)
IncompleteLU = "0.2"

[extras]
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"
QuantumOptics = "6e0679c1-51ea-5a7c-ac74-d61b76210b0c"
QuantumToolbox = "6c2fb7c5-b903-41d2-bc5e-5a7c320b9fab"
Krylov = "ba0b0d4f-ebba-5204-a429-3ac8c609bfb7"
IncompleteLU = "40713840-3770-5561-ab4c-a76e7d0d7895"

[targets]
test = ["Test", "QuantumOptics", "QuantumToolbox", "Krylov", "IncompleteLU"]
